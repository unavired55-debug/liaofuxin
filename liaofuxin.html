<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中华文明 · 历史发展年鉴（多视角版）</title>
<style>
/* ========== CSS 变量与主题 ========== */
:root {
  --bg-primary: #1a1a2e;
  --bg-secondary: #16213e;
  --bg-card: rgba(20, 20, 40, 0.75);
  --text-primary: #e8d5b7;
  --text-secondary: #c4b99a;
  --text-heading: #f0e0c0;
  --gold: #d4a745;
  --gold-light: #f0d68a;
  --vermillion: #c94f3a;
  --vermillion-light: #e8654f;
  --accent-blue: #7b9eb3;
  --accent-green: #8a9e7b;
  --border-gold: linear-gradient(135deg, rgba(212,167,69,0.6), rgba(212,167,69,0.1), rgba(212,167,69,0.6));
  --card-shadow: 0 8px 32px rgba(0,0,0,0.4);
  --glass-bg: rgba(25, 25, 45, 0.7);
  --timeline-bg: #1a1a2e;
  --breadcrumb-bg: rgba(10,10,25,0.9);
  --node-default: #6b6b8a;
  --particle-color: #d4a745;
  --texture-opacity: 0.05;
}

[data-theme="light"] {
  --bg-primary: #f5f0e8;
  --bg-secondary: #ede4d3;
  --bg-card: rgba(255,250,240,0.85);
  --text-primary: #3a2f28;
  --text-secondary: #5a4f45;
  --text-heading: #2a1f18;
  --gold: #b8860b;
  --gold-light: #d4a745;
  --vermillion: #b8422e;
  --vermillion-light: #d44a3a;
  --accent-blue: #5a7a8a;
  --accent-green: #6a8a5a;
  --glass-bg: rgba(255,248,240,0.7);
  --card-shadow: 0 8px 32px rgba(0,0,0,0.15);
  --timeline-bg: #f0ebe0;
  --breadcrumb-bg: rgba(240,235,220,0.95);
  --node-default: #9a9a8a;
  --particle-color: #b8860b;
  --texture-opacity: 0.08;
}

/* ========== 基础样式 ========== */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Serif SC', 'SimSun', 'STSong', 'Songti SC', 'KaiTi', 'STKaiti', serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow-x: hidden;
  min-height: 100vh;
  transition: background 0.5s, color 0.5s;
  position: relative;
}

/* 背景纹理 */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(212,167,69,0.03) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(201,79,58,0.03) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(123,158,179,0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ========== 粒子动画层 ========== */
#particles-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 1;
}

/* ========== 主容器 ========== */
.app-container {
  position: relative;
  z-index: 2;
  max-width: 100%;
  min-height: 100vh;
}

/* ========== 顶部导航栏 ========== */
.navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--breadcrumb-bg);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(212,167,69,0.3);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

.nav-title {
  font-size: 1.2rem;
  color: var(--gold);
  font-weight: bold;
  letter-spacing: 2px;
}

.breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  font-size: 0.9rem;
}

.breadcrumb a {
  color: var(--gold-light);
  text-decoration: none;
  cursor: pointer;
  transition: color 0.3s;
  padding: 4px 8px;
  border-radius: 4px;
}

.breadcrumb a:hover {
  color: var(--vermillion-light);
  background: rgba(212,167,69,0.1);
}

.breadcrumb .separator {
  color: var(--gold);
  opacity: 0.5;
}

.breadcrumb .current {
  color: var(--vermillion-light);
  font-weight: bold;
}

.nav-actions {
  display: flex;
  gap: 12px;
  align-items: center;
}

.theme-toggle {
  background: none;
  border: 1px solid var(--gold);
  color: var(--gold);
  padding: 6px 14px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.85rem;
  transition: all 0.3s;
  font-family: inherit;
}

.theme-toggle:hover {
  background: var(--gold);
  color: var(--bg-primary);
}

/* ========== 快速跳转按钮组 ========== */
.quick-nav {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 16px 24px;
  z-index: 10;
  position: relative;
}

.quick-nav-btn {
  background: rgba(212,167,69,0.1);
  border: 1px solid rgba(212,167,69,0.3);
  color: var(--text-primary);
  padding: 8px 16px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.85rem;
  transition: all 0.3s;
  font-family: inherit;
  white-space: nowrap;
}

.quick-nav-btn:hover, .quick-nav-btn.active {
  background: var(--gold);
  color: #1a1a2e;
  border-color: var(--gold);
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(212,167,69,0.3);
}

/* ========== 第一级：时间轴 ========== */
.timeline-container {
  position: relative;
  padding: 20px 0;
  z-index: 2;
}

.timeline-scroll {
  overflow-x: auto;
  overflow-y: hidden;
  padding: 40px 60px;
  scrollbar-width: thin;
  scrollbar-color: var(--gold) transparent;
  display: flex;
  align-items: center;
}

.timeline-scroll::-webkit-scrollbar {
  height: 6px;
}

.timeline-scroll::-webkit-scrollbar-thumb {
  background: var(--gold);
  border-radius: 3px;
}

.timeline-line {
  display: flex;
  align-items: center;
  position: relative;
  min-width: max-content;
  gap: 0;
}

/* 时间轴中轴线 */
.timeline-line::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--vermillion), var(--gold), var(--accent-blue), var(--gold));
  transform: translateY(-50%);
  border-radius: 2px;
}

.timeline-node {
  position: relative;
  z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  padding: 0 28px;
  transition: all 0.3s;
  flex-shrink: 0;
}

.timeline-dot {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--node-default);
  border: 3px solid var(--bg-primary);
  box-shadow: 0 0 12px rgba(0,0,0,0.5);
  transition: all 0.4s;
  position: relative;
  z-index: 4;
}

.timeline-node:hover .timeline-dot {
  transform: scale(1.6);
  box-shadow: 0 0 24px currentColor;
}

.timeline-label {
  margin-top: 14px;
  text-align: center;
  font-size: 0.8rem;
  color: var(--text-secondary);
  transition: all 0.3s;
  white-space: nowrap;
}

.timeline-node:hover .timeline-label {
  color: var(--gold-light);
  font-weight: bold;
}

.timeline-year {
  font-size: 0.7rem;
  color: var(--text-secondary);
  opacity: 0.7;
  margin-bottom: 8px;
  white-space: nowrap;
}

/* 节点颜色按朝代分组 */
.timeline-dot.prehistoric { background: #8a7a5a; }
.timeline-dot.early-dynasties { background: #a08040; }
.timeline-dot.qin-han { background: #c94f3a; }
.timeline-dot.division { background: #6b8a8a; }
.timeline-dot.sui-tang { background: #d4a745; }
.timeline-dot.song-yuan { background: #7b9eb3; }
.timeline-dot.ming-qing { background: #8a5a4a; }
.timeline-dot.modern { background: #c94040; }

.timeline-node.selected .timeline-dot {
  transform: scale(1.8);
  box-shadow: 0 0 30px var(--gold-light);
  animation: pulse-dot 1.5s infinite;
}

@keyframes pulse-dot {
  0%, 100% { box-shadow: 0 0 20px var(--gold-light); }
  50% { box-shadow: 0 0 40px var(--gold-light), 0 0 60px var(--gold); }
}

/* 悬浮浮层 */
.timeline-tooltip {
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(212,167,69,0.5);
  border-radius: 8px;
  padding: 8px 14px;
  white-space: nowrap;
  font-size: 0.85rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 5;
  margin-bottom: 8px;
}

.timeline-node:hover .timeline-tooltip {
  opacity: 1;
}

/* ========== 内容展示区 ========== */
.content-area {
  padding: 20px 40px;
  max-width: 1400px;
  margin: 0 auto;
  position: relative;
  z-index: 2;
}

/* 时期概览标题 */
.period-header {
  text-align: center;
  margin-bottom: 32px;
  animation: fadeInUp 0.5s ease;
}

.period-header .period-name {
  font-size: 2.8rem;
  color: var(--gold);
  letter-spacing: 6px;
  font-weight: bold;
  margin-bottom: 8px;
}

.period-header .period-info {
  font-size: 1rem;
  color: var(--text-secondary);
  letter-spacing: 2px;
}

.period-header .period-tags {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 12px;
}

.p-tag {
  background: rgba(212,167,69,0.15);
  border: 1px solid rgba(212,167,69,0.3);
  padding: 4px 14px;
  border-radius: 14px;
  font-size: 0.8rem;
  color: var(--gold-light);
}

/* ========== 第二级：视角卡片网格 ========== */
.perspectives-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 24px;
  animation: fadeInUp 0.5s ease;
}

.perspective-card {
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(212,167,69,0.2);
  border-radius: 16px;
  padding: 28px;
  cursor: pointer;
  transition: all 0.4s;
  position: relative;
  overflow: hidden;
  box-shadow: var(--card-shadow);
}

.perspective-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--border-gold);
  border-radius: 16px 16px 0 0;
}

.perspective-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 24px rgba(212,167,69,0.15);
  border-color: rgba(212,167,69,0.5);
}

.card-icon {
  width: 56px;
  height: 56px;
  margin-bottom: 16px;
  position: relative;
}

.card-type-badge {
  display: inline-block;
  font-size: 0.7rem;
  color: var(--gold);
  background: rgba(212,167,69,0.1);
  padding: 3px 10px;
  border-radius: 10px;
  margin-bottom: 10px;
  letter-spacing: 1px;
}

.card-title {
  font-size: 1.2rem;
  color: var(--text-heading);
  margin-bottom: 8px;
  line-height: 1.5;
}

.card-guide {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-bottom: 12px;
  font-style: italic;
  line-height: 1.6;
}

.card-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.card-tag {
  font-size: 0.7rem;
  color: var(--accent-blue);
  border: 1px solid rgba(123,158,179,0.4);
  padding: 2px 8px;
  border-radius: 10px;
}

/* ========== 第三级：视角详情 ========== */
.perspective-detail {
  animation: fadeInUp 0.5s ease;
}

.detail-panel {
  background: var(--glass-bg);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(212,167,69,0.3);
  border-radius: 20px;
  padding: 40px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--card-shadow);
}

.detail-panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--border-gold);
}

.detail-header {
  display: flex;
  align-items: flex-start;
  gap: 20px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}

.detail-icon-area {
  flex-shrink: 0;
  width: 80px;
  height: 80px;
}

.detail-title-area {
  flex: 1;
}

.detail-title {
  font-size: 2rem;
  color: var(--gold);
  letter-spacing: 4px;
  margin-bottom: 8px;
}

.detail-subtitle {
  font-size: 1rem;
  color: var(--text-secondary);
  font-style: italic;
}

.detail-seal {
  position: absolute;
  top: 20px;
  right: 30px;
  width: 60px;
  height: 60px;
  border: 2px solid var(--vermillion);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--vermillion);
  font-size: 0.75rem;
  transform: rotate(12deg);
  opacity: 0.7;
  writing-mode: vertical-rl;
  letter-spacing: 4px;
}

.detail-body {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
}

@media (max-width: 768px) {
  .detail-body { grid-template-columns: 1fr; }
}

.detail-main {
  line-height: 2;
  font-size: 1rem;
}

.detail-main h3 {
  color: var(--gold-light);
  font-size: 1.2rem;
  margin: 20px 0 10px;
  letter-spacing: 2px;
  border-left: 3px solid var(--gold);
  padding-left: 12px;
}

.detail-main p {
  text-indent: 2em;
  margin-bottom: 12px;
}

.detail-sidebar {
  background: rgba(212,167,69,0.05);
  border-left: 1px solid rgba(212,167,69,0.2);
  padding: 20px;
  border-radius: 8px;
}

.detail-sidebar h4 {
  color: var(--gold);
  margin-bottom: 12px;
  letter-spacing: 2px;
}

.keyword-list {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.keyword-item {
  background: rgba(212,167,69,0.15);
  color: var(--gold-light);
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 0.8rem;
}

.related-events {
  list-style: none;
  padding: 0;
}

.related-events li {
  padding: 8px 0;
  border-bottom: 1px dotted rgba(212,167,69,0.15);
  font-size: 0.85rem;
  color: var(--text-secondary);
  line-height: 1.6;
}

.related-events li::before {
  content: '◆ ';
  color: var(--gold);
  font-size: 0.6rem;
}

/* ========== 按钮样式 ========== */
.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(212,167,69,0.1);
  border: 1px solid rgba(212,167,69,0.4);
  color: var(--gold-light);
  padding: 10px 22px;
  border-radius: 24px;
  cursor: pointer;
  font-size: 0.9rem;
  transition: all 0.3s;
  font-family: inherit;
  margin-bottom: 20px;
}

.btn-back:hover {
  background: var(--gold);
  color: #1a1a2e;
}

.btn-group {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

/* ========== 动画 ========== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.fade-in { animation: fadeIn 0.5s ease; }

/* ========== 响应式 ========== */
@media (max-width: 768px) {
  .timeline-scroll { padding: 30px 20px; }
  .timeline-node { padding: 0 16px; }
  .content-area { padding: 16px; }
  .perspectives-grid { grid-template-columns: 1fr; }
  .period-header .period-name { font-size: 1.8rem; letter-spacing: 3px; }
  .navbar { padding: 10px 12px; }
  .nav-title { font-size: 1rem; }
  .detail-panel { padding: 20px; }
  .detail-body { grid-template-columns: 1fr; }
  .detail-title { font-size: 1.4rem; }
  .detail-seal { top: 8px; right: 10px; width: 40px; height: 40px; font-size: 0.6rem; }
  .quick-nav-btn { padding: 6px 10px; font-size: 0.75rem; }
}

/* ========== 隐藏/显示控制 ========== */
.hidden { display: none !important; }

/* ========== 页面尾部 ========== */
footer {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-secondary);
  opacity: 0.6;
  font-size: 0.85rem;
  letter-spacing: 2px;
  border-top: 1px solid rgba(212,167,69,0.15);
  margin-top: 60px;
}
</style>
</head>
<body>

<!-- 粒子画布 -->
<canvas id="particles-canvas"></canvas>

<div class="app-container">
  <!-- 顶部导航 -->
  <nav class="navbar">
    <span class="nav-title" onclick="goToOverview()" style="cursor:pointer;">📜 中华文明·历史年鉴</span>
    <div class="breadcrumb" id="breadcrumb">
      <a onclick="goToOverview()">总览</a>
    </div>
    <div class="nav-actions">
      <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙 夜间模式</button>
    </div>
  </nav>

  <!-- 快速跳转按钮组 -->
  <div class="quick-nav" id="quick-nav">
    <button class="quick-nav-btn" onclick="scrollToPeriodGroup('远古')">远古</button>
    <button class="quick-nav-btn" onclick="scrollToPeriodGroup('先秦')">先秦</button>
    <button class="quick-nav-btn" onclick="scrollToPeriodGroup('秦汉')">秦汉</button>
    <button class="quick-nav-btn" onclick="scrollToPeriodGroup('魏晋南北朝')">魏晋南北朝</button>
    <button class="quick-nav-btn" onclick="scrollToPeriodGroup('隋唐')">隋唐</button>
    <button class="quick-nav-btn" onclick="scrollToPeriodGroup('宋元')">宋元</button>
    <button class="quick-nav-btn" onclick="scrollToPeriodGroup('明清')">明清</button>
    <button class="quick-nav-btn" onclick="scrollToPeriodGroup('近现代')">近现代</button>
  </div>

  <!-- 第一级：时间轴 -->
  <div class="timeline-container" id="timeline-container">
    <div class="timeline-scroll" id="timeline-scroll">
      <div class="timeline-line" id="timeline-line">
        <!-- JS动态生成时间轴节点 -->
      </div>
    </div>
  </div>

  <!-- 内容展示区（第二级/第三级） -->
  <div class="content-area" id="content-area">
    <!-- 默认欢迎信息 -->
    <div id="welcome-message" style="text-align:center;padding:60px 20px;">
      <h2 style="color:var(--gold);font-size:2rem;letter-spacing:6px;margin-bottom:16px;">以史为鉴 · 可知兴替</h2>
      <p style="color:var(--text-secondary);letter-spacing:2px;">点击时间轴上的朝代节点，选择经典历史视角，开启深度阅读之旅</p>
      <p style="color:var(--text-secondary);opacity:0.6;margin-top:12px;">覆盖远古至当代 · 24个历史时期 · 60+经典视角</p>
    </div>
    <div id="level2-content" class="hidden"></div>
    <div id="level3-content" class="hidden"></div>
  </div>

  <footer>
    <p>中华文明 · 历史发展年鉴（多视角版）| 以多维视角探寻文明脉络</p>
  </footer>
</div>

<script>
// ============ 历史数据定义 ============
const historicalData = [
  {
    id: 'ancient',
    name: '远古时代',
    years: '约170万年前—约前2070年',
    capital: '—',
    keyFigures: '炎帝、黄帝、尧、舜、禹',
    group: '远古',
    color: '#8a7a5a',
    dotClass: 'prehistoric',
    perspectives: [
      {
        id: 'ancient-1',
        title: '神话与文明起源——炎黄传说的历史编码',
        type: '文化思想视角',
        guide: '在神话的薄雾中，隐藏着先民对文明起源的最初记忆。',

// ============ 应用状态 ============
let currentLevel = 1;
let currentPeriod = null;
let currentPerspective = null;
let theme = 'dark';

// ============ 初始化 ============
function init() {
  buildTimeline();
  initParticles();
}

// ============ 构建时间轴 ============
function buildTimeline() {
  const line = document.getElementById('timeline-line');
  line.innerHTML = '';

  historicalData.forEach((period, index) => {
    const node = document.createElement('div');
    node.className = 'timeline-node';
    node.setAttribute('data-id', period.id);
    node.setAttribute('data-group', period.group);
    node.onclick = () => selectPeriod(period.id);

    // 年份标签
    const yearSpan = document.createElement('div');
    yearSpan.className = 'timeline-year';
    yearSpan.textContent = period.years;

    // 悬浮浮层
    const tooltip = document.createElement('div');
    tooltip.className = 'timeline-tooltip';
    tooltip.innerHTML = `<strong>${period.name}</strong><br><span style="font-size:0.75rem;">${period.years}</span>`;

    // 节点圆点
    const dot = document.createElement('div');
    dot.className = `timeline-dot ${period.dotClass}`;

    // 朝代名称
    const label = document.createElement('div');
    label.className = 'timeline-label';
    label.textContent = period.name;

    node.appendChild(yearSpan);
    node.appendChild(tooltip);
    node.appendChild(dot);
    node.appendChild(label);
    line.appendChild(node);
  });
}

// ============ 选择时期 → 第二级 ============
function selectPeriod(periodId) {
  const period = historicalData.find(p => p.id === periodId);

  currentPerspective = null;
  currentLevel = 2;

// ============ 返回到时期（第二级） ============
function backToPeriod() {
  if (currentPeriod) {
    selectPeriod(currentPeriod.id);
  }
}

// ============ 返回总览（第一级） ============
function goToOverview() {
  currentLevel = 1;
  currentPeriod = null;
  currentPerspective = null;

  updateBreadcrumb([{ label: '总览', action: null, current: true }]);

  document.getElementById('welcome-message').classList.remove('hidden');
  document.getElementById('level2-content').classList.add('hidden');
  document.getElementById('level3-content').classList.add('hidden');

  updateTimelineSelection(null);

  // 滚动到时间轴
  document.getElementById('timeline-container').scrollIntoView({ behavior: 'smooth' });
}

// ============ 面包屑更新 ============
function updateBreadcrumb(items) {
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = items.map((item, i) => {
    if (i > 0 && i < items.length) {
      return `<span class="separator">›</span>` + (item.action
        ? `<a onclick="${item.action}">${item.label}</a>`
        : `<span class="current">${item.label}</span>`);
    }
    return item.action
      ? `<a onclick="${item.action}">${item.label}</a>`
      : `<span class="current">${item.label}</span>`;
  }).join('');
}

// ============ 时间轴选中高亮 ============
function updateTimelineSelection(periodId) {
  document.querySelectorAll('.timeline-node').forEach(node => {
    if (periodId && node.getAttribute('data-id') === periodId) {
      node.classList.add('selected');
    } else {
      node.classList.remove('selected');
    }
  });
}

// ============ 快速跳转 ============
function scrollToPeriodGroup(groupName) {
  const node = document.querySelector(`.timeline-node[data-group="${groupName}"]`);
  if (node) {
    const container = document.getElementById('timeline-scroll');
    const offset = node.offsetLeft - container.offsetWidth / 2 + node.offsetWidth / 2;
    container.scrollTo({ left: offset, behavior: 'smooth' });
  }
}

// ============ 主题切换 ============
function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('theme-btn');
  btn.textContent = theme === 'dark' ? '🌙 夜间模式' : '☀️ 白天模式';
  // 更新粒子颜色
  initParticles();
}

// ============ 粒子动画 ============
let particles = [];
let animationId;

function initParticles() {
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const particleColor = getComputedStyle(document.documentElement).getPropertyValue('--particle-color').trim();

  // 创建粒子
  particles = [];
  const count = 50;
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      size: Math.random() * 2.5 + 0.8,
      opacity: Math.random() * 0.5 + 0.1
    });
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;

      if (p.x < 0) p.x = canvas.width;
      if (p.x > canvas.width) p.x = 0;
      if (p.y < 0) p.y = canvas.height;
      if (p.y > canvas.height) p.y = 0;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = particleColor.replace(')', `, ${p.opacity})`).replace('rgb', 'rgba');
      if (particleColor.startsWith('#')) {
        const r = parseInt(particleColor.slice(1,3), 16);
        const g = parseInt(particleColor.slice(3,5), 16);
        const b = parseInt(particleColor.slice(5,7), 16);
        ctx.fillStyle = `rgba(${r},${g},${b},${p.opacity})`;
      }
      ctx.fill();

      // 绘制连接线
      particles.forEach(p2 => {
        const dx = p.x - p2.x;
        const dy = p.y - p2.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p2.x, p2.y);
          const alpha = (1 - dist / 120) * 0.12;
          ctx.strokeStyle = particleColor.startsWith('#')
            ? `rgba(${parseInt(particleColor.slice(1,3),16)},${parseInt(particleColor.slice(3,5),16)},${parseInt(particleColor.slice(5,7),16)},${alpha})`
            : particleColor.replace(')', `, ${alpha})`).replace('rgb', 'rgba');
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      });
    });
    animationId = requestAnimationFrame(animate);
  }

  if (animationId) cancelAnimationFrame(animationId);
  animate();
}
